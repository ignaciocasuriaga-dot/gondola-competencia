<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Góndola Competencia – RGM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══ HEADER (sticky) ══════════════════════════════════════════════ -->
  <header class="app-header">
    <div class="header-left">
      <img src="/logo.jpg" alt="RGM" class="header-logo" />
      <div class="header-title-wrap">
        <span class="header-title">Góndola Competencia</span>
        <span class="header-subtitle">Monitor de precios competitivo</span>
      </div>
    </div>
    <div class="header-right">
      <span class="last-update" id="lastUpdate">Sin datos</span>
      <button class="btn-refresh" id="btnRefresh" title="Actualizar precios">
        <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        <span>Actualizar</span>
      </button>
    </div>
  </header>

  <!-- ═══ CATEGORY SELECTOR ════════════════════════════════════════════ -->
  <div class="cat-selector-bar" id="catSelectorBar">
    <button class="cat-pill active" data-cat="Pan de Molde" style="--cat-color: var(--molde)">
      <span class="cat-pill-emoji">🍞</span>
      <span class="cat-pill-name">PAN DE MOLDE</span>
      <span class="cat-pill-badge" id="badgeMolde">—</span>
    </button>
    <button class="cat-pill active" data-cat="Pan de Viena" style="--cat-color: var(--viena)">
      <span class="cat-pill-emoji">🥖</span>
      <span class="cat-pill-name">PAN DE VIENA</span>
      <span class="cat-pill-badge" id="badgeViena">—</span>
    </button>
    <button class="cat-pill active" data-cat="Pan de Tortuga" style="--cat-color: var(--tortuga)">
      <span class="cat-pill-emoji">🍔</span>
      <span class="cat-pill-name">PAN DE HAMBURGUESA</span>
      <span class="cat-pill-badge" id="badgeTortuga">—</span>
    </button>
  </div>

  <!-- ═══ FILTER BAR ════════════════════════════════════════════════════ -->
  <div class="filter-bar" id="filterBar">
    <div class="filter-section">
      <span class="filter-label">Supermercados:</span>
      <div class="chip-row" id="chipSupers">
        <button class="chip chip-disco active" data-super="Disco">Disco</button>
        <button class="chip chip-tata active" data-super="TaTa">TaTa</button>
        <button class="chip chip-ti active" data-super="Tienda Inglesa">Tienda Inglesa</button>
        <button class="chip chip-ed active" data-super="El Dorado">El Dorado</button>
      </div>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-section">
      <span class="filter-label">Marcas:</span>
      <div class="chip-row" id="chipMarcas">
        <button class="chip chip-own active" data-marca="own">🏷 RGM (nuestras)</button>
        <button class="chip chip-comp active" data-marca="comp">🔵 Competencia</button>
      </div>
    </div>
  </div>

  <!-- ═══ MAIN CONTENT ═════════════════════════════════════════════════ -->
  <main class="app-main" id="appMain">
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <p>Cargando datos…</p>
    </div>
  </main>

  <!-- ═══ TOAST ════════════════════════════════════════════════════════ -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
