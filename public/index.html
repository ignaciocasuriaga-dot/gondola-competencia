<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Góndola Competencia – RGM</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="/logo.jpg" alt="RGM" class="sidebar-img" />
      <span class="sidebar-brand">Góndola</span>
    </div>
    <ul class="sidebar-nav">
      <li><a href="#" class="nav-link active" data-view="resumen">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Resumen</span>
      </a></li>
      <li><a href="#" class="nav-link" data-view="categorias">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Por Categoría</span>
      </a></li>
      <li><a href="#" class="nav-link" data-view="supermercados">
        <svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span>Por Supermercado</span>
      </a></li>
      <li><a href="#" class="nav-link" data-view="gap">
        <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        <span>GAP de Precios</span>
      </a></li>
      <li><a href="#" class="nav-link" data-view="ofertas">
        <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        <span>Ofertas</span>
      </a></li>
    </ul>
  </nav>

  <!-- Main content -->
  <div class="main-wrapper">
    <!-- Top bar -->
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" id="viewTitle">Resumen</div>
      <div class="topbar-right">
        <span class="last-update" id="lastUpdate">Sin datos</span>
        <button class="btn-refresh" id="btnRefresh" title="Actualizar precios">
          <svg class="refresh-icon" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Actualizar Precios
        </button>
      </div>
    </header>

    <!-- Filters bar -->
    <div class="filters-bar">
      <div class="filter-group">
        <label class="filter-label">Categorías</label>
        <div class="filter-dropdown" id="filterCategorias">
          <button class="filter-btn" id="btnCategorias">Todas las categorías <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
          <div class="filter-menu" id="menuCategorias">
            <label class="filter-option"><input type="checkbox" value="Pan de Molde" checked /> Pan de Molde</label>
            <label class="filter-option"><input type="checkbox" value="Pan de Tortuga" checked /> Pan de Tortuga</label>
            <label class="filter-option"><input type="checkbox" value="Pan de Viena" checked /> Pan de Viena</label>
          </div>
        </div>
      </div>
      <div class="filter-group">
        <label class="filter-label">Supermercados</label>
        <div class="filter-dropdown" id="filterSupers">
          <button class="filter-btn" id="btnSupers">Todos los supermercados <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
          <div class="filter-menu" id="menuSupers">
            <label class="filter-option"><input type="checkbox" value="Disco" checked /> Disco</label>
            <label class="filter-option"><input type="checkbox" value="TaTa" checked /> TaTa</label>
            <label class="filter-option"><input type="checkbox" value="Tienda Inglesa" checked /> Tienda Inglesa</label>
            <label class="filter-option"><input type="checkbox" value="El Dorado" checked /> El Dorado</label>
          </div>
        </div>
      </div>
    </div>

    <!-- Content area -->
    <main class="content" id="content">
      <!-- Dynamically rendered by app.js -->
      <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <p>Cargando datos...</p>
      </div>
    </main>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
